<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gutter Helmet | All Exterior Solutions | NW Ohio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --aes-blue: #0077C8;
            --aes-green: #00CC33;
            --aes-green-glow: rgba(0, 204, 51, 0.4);
            --aes-blue-glow: rgba(0, 119, 200, 0.5);
            --dark-bg: #030712; 
            --radius-lg: 32px;
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* === GLOBAL BACKGROUND & RAIN PATTERN === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg); 
            color: #F8FAFC; 
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
        }

        /* Subtle Rain Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(var(--aes-blue-glow) 0.5px, transparent 0.5px);
            background-size: 30px 30px; /* Grid Pattern */
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        /* Diagonal Rain Droplets */
        .rain-texture {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 50px,
                rgba(0, 119, 200, 0.05) 50px,
                rgba(0, 119, 200, 0.05) 51px
            );
            z-index: -1;
            pointer-events: none;
        }

        .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 5%; }
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 50px; align-items: center; }

        h1, h2, h3, h4 { font-family: 'Outfit'; line-height: 1; }
        .green { color: var(--aes-green); text-shadow: 0 0 30px var(--aes-green-glow); }

        /* === NAV BAR WITH NEON GREEN UPDATE === */
        header {
            position: fixed; top: 0; width: 100%; z-index: 2000;
            padding: 15px 0;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo-img { height: 55px; width: auto; }

        .dealer-capsule {
            background: rgba(0, 119, 200, 0.15);
            border: 1px solid var(--aes-blue);
            padding: 8px 20px;
            border-radius: 100px;
            text-align: right;
            box-shadow: 0 0 15px var(--aes-blue-glow);
            animation: pulse-blue 3s infinite ease-in-out;
        }
        
        /* Neon Green Font Color Update */
        .dealer-capsule p:last-child {
            font-family: 'Outfit'; 
            font-weight: 700; 
            color: var(--aes-green) !important; 
            font-size: 0.95rem;
            text-shadow: 0 0 10px var(--aes-green-glow);
        }

        @keyframes pulse-blue {
            0%, 100% { box-shadow: 0 0 15px var(--aes-blue-glow); }
            50% { box-shadow: 0 0 25px var(--aes-blue); }
        }

        /* === HERO SECTION === */
        .hero { 
            position: relative; min-height: 110vh; display: flex; align-items: center; padding-top: 140px; padding-bottom: 60px;
            background: linear-gradient(rgba(3, 7, 18, 0.4), var(--dark-bg)),
                        url('assets/images/gutter_helmet_beauty_shot.png') no-repeat center center;
            background-size: cover; background-attachment: fixed;
        }
        .hero-text h1 { font-size: clamp(3rem, 6.5vw, 5rem); font-weight: 900; margin-bottom: 25px;}
        
        .hero-form-console {
            background: rgba(17, 24, 39, 0.75); border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px); padding: 30px; border-radius: var(--radius-lg);
            width: 100%; max-width: 520px; margin-left: auto;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            min-height: 750px;
        }

        /* === ICON CARDS === */
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 100px 0; }
        .icon-card {
            padding: 40px; text-align: center; background: rgba(255,255,255,0.02);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); transition: var(--transition);
            backdrop-filter: blur(5px);
        }
        .icon-card:hover { transform: translateY(-10px); border-color: var(--aes-green); background: rgba(0, 204, 51, 0.05); }
        .aura-icon {
            width: 90px; height: 90px; margin: 0 auto 25px;
            background: radial-gradient(circle, var(--aes-green) 0%, transparent 75%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit'; font-weight: 900; font-size: 1.8rem;
